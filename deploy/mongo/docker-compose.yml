services:
  mongodb:
    image: mongo:7
    container_name: mongo_container
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ztks
    volumes:
      # - ./mongo_data:/data/db
      - /var/docker_mount/mongo_data:/data/db
    networks:
      - network_ztks

networks:
  network_ztks:
    external: true

