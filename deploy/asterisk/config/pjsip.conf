[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

;;;;;;;;;;;;;;;;;;;;;;;;
; USER 1001
;;;;;;;;;;;;;;;;;;;;;;;;

[1001]
type=endpoint
context=internal
disallow=all
allow=opus,ulaw,alaw
auth=1001-auth
aors=1001

webrtc=yes
use_avpf=yes
media_encryption=dtls
dtls_auto_generate_cert=yes
ice_support=yes
rtcp_mux=yes
rewrite_contact=yes
force_rport=yes
direct_media=no

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=123456

[1001]
type=aor
max_contacts=5
remove_existing=yes

