services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_container
    hostname: mssql_container
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - network_ztks

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_ERLANG_COOKIE: ZTKS_SUPERSECRETCOOKIE123456

    volumes:
      - /root/rabbitmq_data:/var/lib/rabbitmq
      # - ./rabbitmq_data:/var/lib/rabbitmq

networks:
  network_ztks:
    external: true

