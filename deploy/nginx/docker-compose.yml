services:
  nginx:
    image: nginx:latest
    container_name: nginx_server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "80:80"
      - "443:443"
    networks:
      - network_ztks
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - /var/www/certbot/www:/var/www/certbot
      - /var/www/certbot/conf:/etc/letsencrypt

  certbot:
    image: certbot/certbot
    volumes:
      - /var/www/certbot/www:/var/www/certbot
      - /var/www/certbot/conf:/etc/letsencrypt

networks:
  network_ztks:
    external: true
