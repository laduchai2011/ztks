services:
  minio:
    image: minio/minio
    container_name: minio_container
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ztkzstore
    volumes:
      - ./minio_data:/data

    command: server /data --console-address ":9001" # 👈 THÊM DÒNG NÀY

    networks:
      - network_zalo_5kaquarium

networks:
  network_zalo_5kaquarium:
    external: true

volumes:
  minio_data:
